<div class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-8">
          <a routerLink="/admin/dashboard" class="text-xl font-bold text-primary">Dystar Admin</a>
          <div class="hidden md:flex gap-4">
            <a routerLink="/admin/dashboard" class="text-gray-600 hover:text-primary px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
            <a routerLink="/admin/users" class="text-gray-600 hover:text-primary px-3 py-2 rounded-md text-sm font-medium">Users</a>
          </div>
        </div>
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-600">{{ authService.currentUser$ | async }}</span>
          <button (click)="logout()" class="text-red-600 hover:text-red-800 text-sm font-medium">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <router-outlet></router-outlet>
  </main>
</div>
