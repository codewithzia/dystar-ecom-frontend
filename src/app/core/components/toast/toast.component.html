<div class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 w-80">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-start gap-3 px-4 py-3 rounded-lg shadow-lg border text-sm transition-all duration-300"
      [class.bg-green-50]="toast.type === 'success'"
      [class.border-green-200]="toast.type === 'success'"
      [class.text-green-800]="toast.type === 'success'"
      [class.bg-red-50]="toast.type === 'error'"
      [class.border-red-200]="toast.type === 'error'"
      [class.text-red-800]="toast.type === 'error'"
      [class.bg-yellow-50]="toast.type === 'warning'"
      [class.border-yellow-200]="toast.type === 'warning'"
      [class.text-yellow-800]="toast.type === 'warning'"
      [class.bg-blue-50]="toast.type === 'info'"
      [class.border-blue-200]="toast.type === 'info'"
      [class.text-blue-800]="toast.type === 'info'">

      <div class="flex-shrink-0 mt-0.5">
        @switch (toast.type) {
          @case ('success') {
            <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          }
          @case ('error') {
            <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          }
          @case ('warning') {
            <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          }
          @default {
            <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          }
        }
      </div>

      <p class="flex-1">{{ toast.message }}</p>

      <button (click)="toastService.dismiss(toast.id)" class="flex-shrink-0 text-gray-400 hover:text-gray-600">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  }
</div>
