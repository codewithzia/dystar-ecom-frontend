<div class="bg-white shadow-lg rounded-lg px-8 py-10">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Dystar Admin</h1>
    <p class="text-gray-600 mt-2">Sign in to your account</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"
        placeholder="superadmin@dystar.local"
      />
    </div>

    <div>
      <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"
        placeholder="Enter your password"
      />
    </div>

    <div *ngIf="errorMessage" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md text-sm">
      {{ errorMessage }}
    </div>

    <button
      type="submit"
      [disabled]="isLoading || loginForm.invalid"
      class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <span *ngIf="isLoading">Signing in...</span>
      <span *ngIf="!isLoading">Sign In</span>
    </button>
  </form>

  <div class="mt-6 text-center text-xs text-gray-500">
    <p>Default: superadmin@dystar.local / SuperAdmin@12345</p>
  </div>
</div>
